<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ICD-9 Lookup</title>
<meta name="description" content="ICD-9 code lookup with search and favorites" />
<meta name="theme-color" content="#1a1a1a" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" type="image/png" sizes="192x192" href="assets/icons/icon-192.png" />
<link rel="apple-touch-icon" href="assets/icons/icon-192.png" />
<link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <header>
    <h1><img src="assets/icons/icon-96.png" alt="ICD-9 Lookup" /></h1>
    <span class="pill admin-only" id="pill-count">0 codes</span>
    <span class="pill admin-only" id="pill-source">source: —</span>

    <!-- Time Calculator Widget -->
    <div class="time-calc-widget" id="time-calc-widget" aria-label="Time calculator">
      <button class="time-calc-toggle" id="time-calc-toggle" aria-expanded="false" aria-controls="time-calc-panel" title="Time calculator">⏱</button>
      <div class="time-calc-panel" id="time-calc-panel" role="group" aria-label="Time calculator inputs">
        <div class="time-calc-inputs">
          <input class="time-calc-input" id="tc-start" type="text" placeholder="Start (11:04)" aria-label="Start time" maxlength="10" autocomplete="off" />
          <input class="time-calc-input" id="tc-end" type="text" placeholder="End (14:30)" aria-label="End time" maxlength="10" autocomplete="off" />
          <input class="time-calc-input tc-duration" id="tc-duration" type="text" placeholder="Mins" aria-label="Duration in minutes" maxlength="5" autocomplete="off" />
          <span class="time-calc-result" id="tc-result" aria-live="polite"></span>
          <button class="time-calc-clear" id="tc-clear" title="Clear all" aria-label="Clear calculator">✕</button>
        </div>
        <div class="time-calc-days-row">
          <input class="time-calc-input tc-days-ago" id="tc-days-ago" type="number" min="0" step="1" placeholder="Days ago" aria-label="Days ago" autocomplete="off" />
          <span class="time-calc-days-result" id="tc-days-result" aria-live="polite"></span>
        </div>
        <div class="billing-suggest hidden" id="tc-billing-suggest" aria-live="polite" aria-label="Suggested billing codes"></div>
      </div>
    </div>

    <label class="admin-toggle">
      <input type="checkbox" id="admin-checkbox" />
      <span>show admin</span>
    </label>
  </header>

  <div class="controls">
    <input id="q" type="text" placeholder="Search by code, name, or synonyms… (e.g., 296.20, depression, cholera)" autocomplete="off" />
    <button class="admin-only" id="btn-refresh" title="Fetch icd9.json and update cache">Refresh dataset</button>
    <button class="admin-only" id="btn-clear" title="Clear cached dataset">Clear cache</button>
    <button class="admin-only" id="btn-export" title="Download current dataset JSON from cache">Export JSON</button>
  </div>

  <div id="meta" class="admin-only">
    <span>Cache: <strong id="cache-state" class="muted">checking…</strong></span>
    <span>Version: <code id="cache-version">—</code></span>
    <span>Updated: <span id="cache-updated" class="muted">—</span></span>
  </div>

  <!-- FAVOURITES (pinned to the top) -->
  <section id="favWrap" class="hidden">
    <h2>Favourites <span class="muted" id="favCount">(0)</span></h2>
    <div id="favs" class="grid"></div>
  </section>

  <!-- RESULTS (below favourites) -->
  <section>
    <h2 id="resTitle">Results</h2>
    <div id="results" class="grid"></div>
  </section>

  <!-- Edit Modal Overlay -->
  <div id="edit-modal-overlay" class="modal-overlay"></div>

  <!-- Edit Modal -->
  <div id="edit-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="edit-modal-title">
    <div class="modal-header">
      <h2 id="edit-modal-title">Edit <span class="code" id="edit-code"></span></h2>
      <button type="button" class="modal-close" id="edit-cancel-btn" aria-label="Close">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label for="edit-name">Name</label>
        <input type="text" id="edit-name" class="form-input" placeholder="Full name" />
      </div>
      <div class="form-group">
        <label for="edit-short">Short name</label>
        <input type="text" id="edit-short" class="form-input" placeholder="Short display name" />
      </div>
      <div class="form-group">
        <label for="edit-kind">Kind</label>
        <input type="text" id="edit-kind" class="form-input" placeholder="e.g. dx, proc" />
      </div>
      <div class="form-group">
        <label>Synonyms</label>
        <div id="edit-syn-container"></div>
      </div>
      <div class="form-group">
        <label>Tags <span class="muted" style="font-weight:normal;font-size:.85rem">(searchable custom labels)</span></label>
        <div id="edit-tags-container"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button type="button" id="edit-reset-btn" class="btn-reset" style="display:none">Reset to default</button>
      <div class="modal-footer-actions">
        <button type="button" id="edit-cancel-btn-footer" class="btn-cancel">Cancel</button>
        <button type="button" id="edit-save-btn" class="btn-save">Save</button>
      </div>
    </div>
  </div>

  <!-- Fuse.js for fuzzy search -->
  <script src="assets/js/fuse.min.js"></script>
  <!-- Main application JavaScript -->
  <script src="assets/js/app.js"></script>
  <!-- Time Calculator Widget -->
  <script type="module" src="assets/js/time-calc-widget.js"></script>
  <!-- Service Worker registration -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(err => {
        console.warn('SW registration failed:', err);
      });
    }
  </script>
</body>
</html>
